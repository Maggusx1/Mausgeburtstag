<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für dich ❤️</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    
    /* 🔥 WICHTIG: kein 100vh mehr */
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;

    padding: 20px 0;
    overflow-x: hidden;
  }

  .card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 25px;
    text-align: center;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    z-index: 2;
  }

  img {
    width: 100%;
    max-height: 180px;   /* 🔥 DAS IST DER WICHTIGE PART */
    object-fit: cover;
    border-radius: 15px;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .day {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
  }

  #message {
    font-size: 16px;
    line-height: 1.5;
    white-space: pre-line;
    min-height: auto;
  }

  .heart {
    position: fixed;
    bottom: -10px;
    font-size: 18px;
    animation: floatUp 6s linear infinite;
    opacity: 0.5;
  }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 0.5; }
    100% { transform: translateY(-100vh); opacity: 0; }
  }
</style>
</head>

<body>

<div class="card">
  <img id="dayImage">
  <h1>💌 Für dich ❤️</h1>
  <div class="day" id="day"></div>
  <p id="message"></p>
</div>

<script>

// 📅 STARTDATUM
const startDate = new Date("2026-03-22");

// 💌 Nachrichten (Tag 7 = alte Tag 3 Message)
const messages = [
`Tag 1.
Deine Woche beginnt –
und ich hoffe, sie fühlt sich genauso gut an,
wie du mein Leben fühlen lässt.`,

`Tag 2.
Ich wollte dir nur sagen:
Du bist nicht nur besonders.
Du bist mein Lieblingsmensch.`,

`Tag 3.
Mit dir fühlt sich alles leichter an.
Als würde die Welt kurz stillstehen,
nur damit wir sie genießen können.`,

`Tag 4.
Manchmal reicht ein Gedanke an dich,
und alles wird besser.`,

`Tag 5.
Ich weiß nicht, was ich ohne dich machen würde.
Aber ich weiß,
dass ich es nicht will.`,

`Tag 6.
Du bist mein Ruhepunkt.
Mein Chaos-Ausgleich.
Mein Zuhause.`,

`Tag 7.
Mit dir fühlt sich alles leichter an.
Als würde die Welt kurz stillstehen,
nur damit wir sie genießen können.`
];

// 📸 PNG Bilder
const images = [
  "tag1.png",
  "tag2.png",
  "tag3.png",
  "tag4.png",
  "tag5.png",
  "tag6.png",
  "tag7.png"
];

const today = new Date();
const diffTime = today - startDate;
let dayCount = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

// 🔒 Begrenzung
if (dayCount < 1) dayCount = 1;
if (dayCount > 7) dayCount = 7;

// 🏷️ Anzeige
document.getElementById("day").innerText =
  "Tag " + dayCount + " deiner Geburtstagswoche ❤️";

// 💌 Nachricht
document.getElementById("message").innerText =
  messages[dayCount - 1];

// 📸 Bild
document.getElementById("dayImage").src =
  images[dayCount - 1];

// ❤️ Herzen
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 900);

</script>

</body>
</html>
