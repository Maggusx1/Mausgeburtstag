<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für dich ❤️</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    width: 85%;
    max-width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    z-index: 2;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .day {
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
  }

  #message {
    font-size: 18px;
    line-height: 1.6;
    white-space: pre-line;
    min-height: 120px;
    transition: opacity 0.5s;
  }

  /* ❤️ Herzen */
  .heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    opacity: 0.6;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) scale(1);
      opacity: 0.6;
    }
    100% {
      transform: translateY(-100vh) scale(1.5);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<div class="card">
  <h1>💌 Für dich ❤️</h1>
  <div class="day" id="day"></div>
  <p id="message"></p>
</div>

<script>
const messages = [
`Du wachst auf,
und irgendwo beginnt mein Tag mit dir.

Selbst wenn wir uns nicht sehen –
du bist immer da.`,

`Zwischen all den Gedanken,
bist du der schönste.

Der, zu dem ich immer wieder zurückkomme.`,

`Es gibt tausend Dinge,
die ich sagen könnte.

Aber meistens reicht eins:
Ich hab dich lieb.`,

`Manchmal ist es still.

Und genau dann merke ich,
wie viel du mir bedeutest.`,

`Du bist kein Teil meines Lebens.

Du bist der Teil,
der alles besser macht.`,

`Wenn ich an dich denke,
fühlt sich alles leichter an.

Als würde die Welt kurz Pause machen.`,

`Es sind nicht die großen Momente.

Es sind die kleinen –
mit dir.`,

`Ich weiß nicht,
was die Zukunft bringt.

Aber ich weiß,
dass ich dich darin will.`,

`Du bist mein Ruhepunkt
in all dem Chaos.

Und mein Lieblingsgedanke.`,

`Mit dir fühlt sich selbst ein normaler Tag
besonders an.

Und das ist eigentlich alles, was zählt.`,

`Es gibt keinen perfekten Moment.

Aber mit dir
fühlt sich jeder so an.`,

`Ich könnte überall sein.

Aber am liebsten
bin ich bei dir.`
];

// 📅 Startdatum
const startDate = new Date("2026-03-22");
const today = new Date();
const diffTime = today - startDate;
const dayCount = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

document.getElementById("day").innerText = "Tag " + dayCount + " mit dir ❤️";

// 💌 genau eine Nachricht pro Tag
const dailyMessage = messages[dayCount % messages.length];
document.getElementById("message").innerText = dailyMessage;

// ❤️ Herzen
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 900);
</script>

</body>
</html>
